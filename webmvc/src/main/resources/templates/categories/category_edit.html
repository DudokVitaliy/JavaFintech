<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">

<body>

<div layout:fragment="content" class="container pt-4">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-warning">
                    <h4>Редагувати категорію</h4>
                </div>

                <div class="card-body">

                    <form th:action="@{/categories/edit}" method="post">

                        <input type="hidden" name="id" th:value="${category.id}"/>

                        <div class="mb-3">
                            <label class="form-label">Назва</label>
                            <input type="text"
                                   name="name"
                                   th:value="${category.name}"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Slug</label>
                            <input type="text"
                                   name="slug"
                                   th:value="${category.slug}"
                                   class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Image</label>
                            <input type="text"
                                   name="image"
                                   th:value="${category.image}"
                                   class="form-control">
                        </div>

                        <div class="mb-3 text-center" th:if="${category.image != null}">
                            <img th:src="@{'/images/large/' + ${category.image}}"
                                 class="img-fluid rounded"
                                 style="max-height: 200px;">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/categories/list" class="btn btn-secondary">Назад</a>
                            <button type="submit" class="btn btn-primary">Оновити</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
