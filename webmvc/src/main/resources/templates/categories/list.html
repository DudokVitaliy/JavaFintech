<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<body>

<div layout:fragment="content" style="min-height: 80vh">

    <main class="pt-4">
        <div class="container">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Categories</h2>
                <a th:href="@{/categories/add}" class="btn btn-success">
                    + Add Category
                </a>
            </div>

            <div th:if="${#lists.isEmpty(categories)}" class="alert alert-info">
                No categories found. Create your first one.
            </div>

            <div class="row" th:if="${!#lists.isEmpty(categories)}">

                <div class="col-md-4 mb-4"
                     th:each="category : ${categories}">

                    <div class="card h-100 shadow-sm">

                        <img th:src="@{'/images/large/' + ${category.image}}"
                             class="card-img-top"
                             style="height: 200px; object-fit: cover;"
                             alt="Category image">

                        <div class="card-body d-flex flex-column">

                            <h5 class="card-title"
                                th:text="${category.name}"></h5>

                            <p class="card-text text-muted mb-3"
                               th:text="${category.slug}"></p>

                            <div class="mt-auto d-flex justify-content-between">

                                <a th:href="@{'/categories/edit/' + ${category.id}}"
                                   class="btn btn-warning btn-sm">
                                    Edit
                                </a>

                                <form th:action="@{'/categories/delete/' + ${category.id}}"
                                      method="post"
                                      onsubmit="return confirm('Delete this category?');">

                                    <button type="submit"
                                            class="btn btn-danger btn-sm">
                                        Delete
                                    </button>
                                </form>

                            </div>

                        </div>
                    </div>

                </div>

            </div>

        </div>
    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
